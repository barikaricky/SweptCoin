<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 130" width="460" height="130">
  <defs>
    <radialGradient id="coinGrad" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFE57F"/>
      <stop offset="50%" stop-color="#F4A800"/>
      <stop offset="100%" stop-color="#C77A00"/>
    </radialGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1B3E"/>
      <stop offset="100%" stop-color="#1A3A6E"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C6FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00C6FF"/>
      <stop offset="100%" stop-color="#7B2FF7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="460" height="130" rx="18" fill="url(#bgGrad)"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="32" x2="460" y2="32" stroke="rgba(0,198,255,0.05)" stroke-width="1"/>
  <line x1="0" y1="65" x2="460" y2="65" stroke="rgba(0,198,255,0.05)" stroke-width="1"/>
  <line x1="0" y1="98" x2="460" y2="98" stroke="rgba(0,198,255,0.05)" stroke-width="1"/>
  <line x1="115" y1="0" x2="115" y2="130" stroke="rgba(0,198,255,0.04)" stroke-width="1"/>
  <line x1="230" y1="0" x2="230" y2="130" stroke="rgba(0,198,255,0.04)" stroke-width="1"/>
  <line x1="345" y1="0" x2="345" y2="130" stroke="rgba(0,198,255,0.04)" stroke-width="1"/>

  <!-- Sweep arc trails behind coin -->
  <path d="M 18 100 Q 58 28 106 66" stroke="url(#arcGrad)" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 12 106 Q 50 22 106 66" stroke="url(#arcGrad)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M 24 94 Q 66 34 106 66" stroke="url(#arcGrad)" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.2"/>

  <!-- Coin -->
  <circle cx="106" cy="66" r="41" fill="url(#coinGrad)" filter="url(#glow)"/>
  <!-- Coin inner ring -->
  <circle cx="106" cy="66" r="33" fill="none" stroke="#C77A00" stroke-width="1.5" opacity="0.5"/>
  <!-- Coin shine highlight -->
  <ellipse cx="98" cy="52" rx="10" ry="6" fill="rgba(255,255,200,0.18)" transform="rotate(-20, 98, 52)"/>
  <!-- Dollar sign -->
  <text x="106" y="78" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#FFF5CC" text-anchor="middle">$</text>

  <!-- Speed lines -->
  <line x1="152" y1="58" x2="170" y2="58" stroke="#00C6FF" stroke-width="2.2" stroke-linecap="round" opacity="0.8"/>
  <line x1="152" y1="66" x2="174" y2="66" stroke="#00C6FF" stroke-width="3" stroke-linecap="round" opacity="1"/>
  <line x1="152" y1="74" x2="170" y2="74" stroke="#00C6FF" stroke-width="2.2" stroke-linecap="round" opacity="0.8"/>

  <!-- Wordmark -->
  <text x="184" y="58" font-family="'Segoe UI', Arial, sans-serif" font-size="38" font-weight="900" letter-spacing="-0.5" fill="#FFFFFF">Swept</text>
  <text x="330" y="58" font-family="'Segoe UI', Arial, sans-serif" font-size="38" font-weight="900" letter-spacing="-0.5" fill="#00C6FF">Coin</text>

  <!-- Tagline -->
  <text x="184" y="84" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="400" letter-spacing="4.5" fill="#7EB8FF" opacity="0.85">AI  TRADING  INTELLIGENCE</text>

  <!-- AI Badge -->
  <rect x="394" y="90" width="52" height="22" rx="5" fill="#7B2FF7" opacity="0.9"/>
  <text x="420" y="106" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">AI BOT</text>
</svg>
